        let cart = [];
        let currentItem = null;
        let selectedVariation = null;
        let tableNumber = null;

        function getTableNumber() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('table') || '?';
        }

        function getCategories() {
            return [...new Set(menu.map(item => item.category))];
        }

        function getManilaTimestamp() {
            return new Date().toLocaleString('en-US', {
                timeZone: 'Asia/Manila'
            });
        }

        function init() {
            tableNumber = getTableNumber();
            document.getElementById('tableNumber').textContent = tableNumber;
            renderCategoryTabs();
            renderMenu();
            setupSearch();
        }

        function renderCategoryTabs() {
            const tabs = document.getElementById('categoryTabs');
            const categories = getCategories();
            
            tabs.innerHTML = categories.map(cat => 
                `<button class="category-tab" onclick="scrollToCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function scrollToCategory(category) {
            const section = document.getElementById(`cat-${category}`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderMenu(searchTerm = '') {
            const content = document.getElementById('menuContent');
            const noResults = document.getElementById('noResults');
            const categories = getCategories();
            
            let html = '';
            let totalItems = 0;

            categories.forEach(category => {
                const items = menu.filter(item => 
                    item.category === category &&
                    (searchTerm === '' || item.name.toLowerCase().includes(searchTerm.toLowerCase()))
                );

                if (items.length > 0) {
                    totalItems += items.length;
                    html += `
                        <div class="category-section" id="cat-${category}">
                            <div class="category-header" onclick="toggleCategory('${category}')">
                                <h2>
                                    ${category}
                                    <span class="category-count">${items.length}</span>
                                </h2>
                                <span class="toggle-icon">▼</span>
                            </div>
                            <div class="category-items" id="items-${category}">
                                ${items.map(item => `
                                    <div class="menu-item">
                                        <div class="item-image">${item.image || '🍽️'}</div>
                                        <div class="item-details">
                                            <h3>${item.name}</h3>
                                            <p class="price">${item.price ? '₱' + item.price : 'See variations'}</p>
                                            ${item.variations ? `<p class="variations">Multiple sizes available</p>` : ''}
                                        </div>
                                        <button class="add-btn" onclick="addToCart(${item.id})">Add +</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            });

            content.innerHTML = html;
            noResults.style.display = totalItems === 0 ? 'block' : 'none';
        }

        function toggleCategory(category) {
            const items = document.getElementById(`items-${category}`);
            const header = items.previousElementSibling;
            
            items.classList.toggle('hidden');
            header.classList.toggle('collapsed');
        }

        function setupSearch() {
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                renderMenu(e.target.value);
            });
        }

        function addToCart(itemId) {
            const item = menu.find(m => m.id === itemId);
            
            if (item.variations) {
                openVariationModal(item);
            } else {
                const existingItem = cart.find(cartItem => 
                    cartItem.id === item.id && !cartItem.selectedVariation
                );
                
                if (existingItem) {
                    existingItem.quantity++;
                    showNotification(`Added ${item.name}! (${existingItem.quantity})`);
                } else {
                    cart.push({ ...item, quantity: 1 });
                    showNotification(`Added ${item.name}!`);
                }
                
                updateCartButton();
            }
        }

        function openVariationModal(item) {
            currentItem = item;
            selectedVariation = null;
            
            document.getElementById('variationItemName').textContent = item.name;
            document.getElementById('variationOptions').innerHTML = item.variations.map((v, i) => `
                <div class="variation-option" onclick="selectVariation(${i})">
                    <span>${v.size}</span>
                    <strong>₱${v.price}</strong>
                </div>
            `).join('');
            
            document.getElementById('variationModal').classList.add('active');
        }

        function selectVariation(index) {
            selectedVariation = index;
            document.querySelectorAll('.variation-option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }

        function confirmVariation() {
            if (selectedVariation === null) {
                alert('Please select a size');
                return;
            }
            
            const variation = currentItem.variations[selectedVariation];
            
            const existingItem = cart.find(cartItem => 
                cartItem.id === currentItem.id && 
                cartItem.selectedVariation && 
                cartItem.selectedVariation.size === variation.size
            );
            
            if (existingItem) {
                existingItem.quantity++;
                showNotification(`Added ${currentItem.name} (${variation.size})! (${existingItem.quantity})`);
            } else {
                cart.push({
                    ...currentItem,
                    selectedVariation: variation,
                    price: variation.price,
                    quantity: 1
                });
                showNotification(`Added ${currentItem.name} (${variation.size})!`);
            }
            
            updateCartButton();
            closeVariationModal();
        }

        function closeVariationModal() {
            document.getElementById('variationModal').classList.remove('active');
        }

        function updateCartButton() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            document.getElementById('cartBtn').innerHTML = `🛒 Cart (${totalItems} items) - ₱${totalPrice}`;
        }

        function openCartModal() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            renderCartModal();
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function renderCartModal() {
            const list = document.getElementById('cartItemsList');
            const summary = document.getElementById('cartSummary');
            
            if (cart.length === 0) {
                list.innerHTML = '<div class="empty-message">Your cart is empty</div>';
                summary.innerHTML = '';
                return;
            }
            
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        ${item.selectedVariation ? `<p class="cart-item-variation">${item.selectedVariation.size}</p>` : ''}
                        <p>₱${item.price} × ${item.quantity} = ₱${item.price * item.quantity}</p>
                    </div>
                    <div class="quantity-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        <button class="remove-btn" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            summary.innerHTML = `
                <div class="summary-row"><span>Items:</span><span>${totalItems}</span></div>
                <div class="summary-row total"><span>Total:</span><span>₱${total}</span></div>
                <button class="send-order-btn" onclick="sendOrder()">Send Order to Staff</button>
            `;
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            updateCartButton();
            renderCartModal();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartButton();
            renderCartModal();
        }

        // FIREBASE-ENABLED SEND ORDER
        async function sendOrder() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const timestamp = getManilaTimestamp();
            
            const date = new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' });
            const dateObj = new Date(date);
            const orderDate = dateObj.toISOString().split('T')[0].replace(/-/g, '');
            
            try {
                // Get existing orders from Firebase to generate order number
                const ordersRef = window.firebaseRef(window.firebaseDB, 'orders');
                const snapshot = await window.firebaseGet(ordersRef);
                const existingOrders = snapshot.exists() ? Object.values(snapshot.val()) : [];
                
                const todayOrders = existingOrders.filter(o => o.orderId.includes(orderDate));
                const orderNumber = (todayOrders.length + 1).toString().padStart(3, '0');
                const orderId = `YY-${orderDate}-${orderNumber}`;
                
                const order = {
                    orderId: orderId,
                    tableNumber: tableNumber,
                    items: cart.map(item => ({
                        name: item.name,
                        price: item.price,
                        quantity: item.quantity,
                        variation: item.selectedVariation ? item.selectedVariation.size : null,
                        station: item.station
                    })),
                    total: total,
                    status: 'pending',
                    timestamps: {
                        submitted: timestamp,
                        confirmed: null,
                        ready: null,
                        delivered: null
                    }
                };
                
                // Save to Firebase
                const newOrderRef = window.firebasePush(ordersRef);
                await window.firebaseSet(newOrderRef, order);
                
                console.log('🔥 ORDER SENT TO FIREBASE:', order);
                alert(`✅ Order #${orderId} sent! Please wait for staff confirmation.`);
                
                cart = [];
                updateCartButton();
                closeCartModal();
                
            } catch (error) {
                console.error('❌ Firebase error:', error);
                alert('❌ Failed to send order. Please try again!');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 20px; right: 20px;
                background: #10b981; color: white;
                padding: 15px 20px; border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 3000;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // Make functions global
        window.scrollToCategory = scrollToCategory;
        window.toggleCategory = toggleCategory;
        window.addToCart = addToCart;
        window.selectVariation = selectVariation;
        window.confirmVariation = confirmVariation;
        window.closeVariationModal = closeVariationModal;
        window.openCartModal = openCartModal;
        window.closeCartModal = closeCartModal;
        window.updateQuantity = updateQuantity;
        window.removeFromCart = removeFromCart;
        window.sendOrder = sendOrder;

        init();
    </script>
</body>
</html>
